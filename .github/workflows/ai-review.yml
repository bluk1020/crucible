name: Crucible — AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    name: Trigger AI Review Swarm
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to Donna
        run: |
          curl -s -X POST "https://macmini.salmon-stonecat.ts.net/hooks/agent" \
            -H "Authorization: Bearer ${{ secrets.HOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"message\": \"Run code review on PR: ${{ github.event.pull_request.html_url }}\nRun this command and do nothing else: python3 ~/.openclaw/workspace/scripts/agent-monitor/code_review_rt.py --pr-url ${{ github.event.pull_request.html_url }}\",
              \"deliver\": false
            }"
          echo "✅ Review dispatched to AI swarm"
